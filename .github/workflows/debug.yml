name: Debug APK → Pre-Release

# Triggers on EVERY push to ANY branch
on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: LexiPopup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('LexiPopup/**/*.gradle*', 'LexiPopup/**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant Gradlew Permission
        run: chmod +x ./gradlew

      - name: Run Unit Tests
        run: ./gradlew test --no-daemon --continue

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cp app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/LexiPopup-debug-${SHORT_SHA}.apk

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LexiPopup-Debug-${{ github.sha }}
          path: LexiPopup/app/build/outputs/apk/debug/LexiPopup-debug-*.apk
          retention-days: 14

      - name: Delete Existing Pre-Release Tag
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git push origin :refs/tags/debug-latest 2>/dev/null || true
        working-directory: ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create / Update Debug Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-latest
          name: "🔧 Debug Build (latest)"
          body: |
            **Auto-built debug APK** from branch `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
            Built at: ${{ github.event.head_commit.timestamp }}

            ⚠️ This is a **debug build** — for testing only.
            For the signed release APK, push a version tag:
            ```
            git tag v1.0.0 && git push origin v1.0.0
            ```
          prerelease: true
          files: LexiPopup/app/build/outputs/apk/debug/LexiPopup-debug-*.apk
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
