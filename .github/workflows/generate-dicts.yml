name: Generate Dictionary Packs

# Run manually from GitHub → Actions → "Generate Dictionary Packs" → Run workflow
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install nltk tqdm requests

      - name: Download NLTK data
        run: |
          python -c "
          import nltk
          nltk.download('wordnet')
          nltk.download('omw-1.4')
          nltk.download('cmudict')
          nltk.download('words')
          print('All NLTK data downloaded.')
          "

      - name: Generate dictionary packs
        run: python LexiPopup/scripts/generate_dicts.py

      - name: Show output sizes and checksums
        run: |
          ls -lh output/
          cat output/checksums.txt

      - name: Delete old dict release (if exists)
        continue-on-error: true
        run: gh release delete dict-v1 --yes --cleanup-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish dictionary packs as GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dict-v1
          name: "Dictionary Packs v1"
          body: |
            ## LexiPopup Dictionary Packs

            Auto-generated from Wiktionary + WordNet 3.1 + Hindi WordNet (OMW).

            | Pack | Words | Size | Contents |
            |------|-------|------|----------|
            | `dict_minimal_v1.db.gz` | ~10,000 | ~15 MB | Most common English + Hindi (OMW) |
            | `dict_standard_v1.db.gz` | ~155,000 | ~80 MB | All WordNet (single + compound) + Hindi |
            | `dict_full_v1.db.gz` | ~700K–1M+ | ~200 MB | Wiktionary English + WordNet + Hindi WordNet |

            ### Data sources (all free / open)
            - **Wiktionary English** (kaikki.org pre-parsed JSONL) — CC BY-SA 3.0
            - **WordNet 3.1** (Princeton University) — free for all use
            - **CMU Pronouncing Dictionary** — Public Domain
            - **Hindi WordNet / OMW 1.4** (Open Multilingual WordNet) — CC BY 3.0

            ### SHA-256 checksums
            See `checksums.txt` attached below.
            These are automatically patched into the app source after each run.
          files: |
            output/dict_minimal_v1.db.gz
            output/dict_standard_v1.db.gz
            output/dict_full_v1.db.gz
            output/checksums.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-patch checksums into DictionaryDownloadWorker.kt
        run: |
          MINIMAL_SHA=$(grep  "^MINIMAL "  output/checksums.txt | awk '{print $3}')
          STANDARD_SHA=$(grep "^STANDARD " output/checksums.txt | awk '{print $3}')
          FULL_SHA=$(grep     "^FULL "     output/checksums.txt | awk '{print $3}')

          echo "MINIMAL  SHA: $MINIMAL_SHA"
          echo "STANDARD SHA: $STANDARD_SHA"
          echo "FULL     SHA: $FULL_SHA"

          FILE="LexiPopup/app/src/main/java/com/lexipopup/data/download/DictionaryDownloadWorker.kt"

          sed -i "s|DatabasePack.MINIMAL.name  to \"[^\"]*\"|DatabasePack.MINIMAL.name  to \"${MINIMAL_SHA}\"|"  "$FILE"
          sed -i "s|DatabasePack.STANDARD.name to \"[^\"]*\"|DatabasePack.STANDARD.name to \"${STANDARD_SHA}\"|" "$FILE"
          sed -i "s|DatabasePack.FULL.name     to \"[^\"]*\"|DatabasePack.FULL.name     to \"${FULL_SHA}\"|"     "$FILE"

          echo "--- Patched PACK_CHECKSUMS section ---"
          grep -A5 "PACK_CHECKSUMS" "$FILE"

      - name: Commit and push updated checksums
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add LexiPopup/app/src/main/java/com/lexipopup/data/download/DictionaryDownloadWorker.kt
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: auto-update dictionary pack checksums [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
