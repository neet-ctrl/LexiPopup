          echo "✅ Keystore decoded"
          keytool -list -v -keystore keystore.jks -storepass 'Sh@090609' -noprompt 2>&1 | grep "Alias name"

      - name: Run Unit Tests
        run: ./gradlew test --no-daemon --continue

      - name: Build Signed Release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/keystore.jks \
            -Pandroid.injected.signing.store.password='Sh@090609' \
            -Pandroid.injected.signing.key.alias=my-key \
            -Pandroid.injected.signing.key.password='Sh@090609' \
            --no-daemon --stacktrace

      - name: Rename & Verify Signed APK
        run: |
          VERSION=${{ github.ref_name }}
          VER=${VERSION#v}
          cp app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/LexiPopup-${VER}-signed.apk

          BUILD_TOOLS=$(ls ${ANDROID_SDK_ROOT}/build-tools | sort -V | tail -n1)
          ${ANDROID_SDK_ROOT}/build-tools/${BUILD_TOOLS}/apksigner verify \
            --print-certs app/build/outputs/apk/release/LexiPopup-${VER}-signed.apk \
            && echo "✅ APK signature verified"

          echo "APK_VER=${VER}" >> $GITHUB_ENV

      - name: Shred Keystore from Runner
        if: always()
        run: shred -u keystore.jks 2>/dev/null || rm -f keystore.jks

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "🚀 LexiPopup ${{ github.ref_name }}"
          body: |
            ## LexiPopup ${{ github.ref_name }}

            ### Installation
            1. Download `LexiPopup-${{ env.APK_VER }}-signed.apk` below
            2. On your Android device: **Settings → Install unknown apps → allow your browser**
            3. Open the downloaded APK and install
            4. Grant **Display over other apps** permission when prompted
            5. Open Moon+ Reader → long-press any word → Dictionary → **LexiPopup** ✅

            ### What's included
            - Offline dictionary (1000+ seed words, full pack downloadable in-app)
            - Moon+ Reader PROCESS_TEXT integration
            - Persistent notification quick-launcher
            - Vocabulary dashboard + flashcards (SM-2 SRS)
            - 3D glassmorphism popup UI with parallax tilt
            - Hindi meanings, synonyms, antonyms, etymology
            - CSV / JSON / Anki export

            ### Signed with
            - Key alias: `my-key`
            - Build: `${{ github.sha }}`
          prerelease: false
          make_latest: true
          generate_release_notes: true
          files: LexiPopup/app/build/outputs/apk/release/LexiPopup-*-signed.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
