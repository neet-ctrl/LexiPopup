name: Release APK → GitHub Release

# Triggers ONLY when you push a version tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build-release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: LexiPopup

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('LexiPopup/**/*.gradle*', 'LexiPopup/**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant Gradlew Permission
        run: chmod +x ./gradlew

