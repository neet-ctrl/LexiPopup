name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x LexiPopup/gradlew

      - name: Build release APK (unsigned for now)
        working-directory: LexiPopup
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          cd LexiPopup/app/build/outputs/apk/release
          mv app-release-unsigned.apk LexiPopup-${{ github.ref_name }}.apk 2>/dev/null || \
          mv app-release.apk LexiPopup-${{ github.ref_name }}.apk 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "LexiPopup ${{ github.ref_name }}"
          body: |
            ## LexiPopup ${{ github.ref_name }}

            ### What's included
            - Full offline dictionary (seed words built-in)
            - Groq AI fallback (free API key at console.groq.com)
            - On-device AI support (Gemma 2B / Phi-2)
            - Flashcards with SM-2 spaced repetition
            - Moon+ Reader integration
            - Hindi meanings

            ### Install
            1. Download `LexiPopup-${{ github.ref_name }}.apk`
            2. Transfer to your Android device
            3. Enable "Install from unknown sources"
            4. Tap the APK to install

            ### After installing
            - Grant "Display over other apps" permission
            - Open LexiPopup → Settings → Manage Dictionary Packs → download a pack
            - For AI: Settings → AI Assistant → Configure → enter free Groq API key
          files: LexiPopup/app/build/outputs/apk/release/LexiPopup-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
